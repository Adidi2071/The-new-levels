<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NSMB Mod Patcher</title>
</head>
<body>

<h1>🎮 Patch ton mod NSMB DS</h1>

<p>ROM originale :</p>
<input type="file" id="rom">

<p>Patch (.xdelta) :</p>
<input type="file" id="patch">

<br><br>
<button onclick="patch()">⚡ PATCH</button>

<script src="https://unpkg.com/xdelta3"></script>

<script>
async function patch() {
    const romFile = document.getElementById("rom").files[0];
    const patchFile = document.getElementById("patch").files[0];

    if (!romFile || !patchFile) {
        alert("mets la ROM + le patch");
        return;
    }

    const romBuffer = await romFile.arrayBuffer();
    const patchBuffer = await patchFile.arrayBuffer();

    try {
        const output = xdelta3.decode(new Uint8Array(romBuffer), new Uint8Array(patchBuffer));

        const blob = new Blob([output], {type: "application/octet-stream"});
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "NSMB_MOD.nds";
        a.click();

        URL.revokeObjectURL(url);

    } catch (e) {
        alert("Erreur patch : " + e);
        console.log(e);
    }
}
</script>

</body>
</html>
